<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARS OS | Control Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-blue: #00d2ff; --neon-green: #39ff14; --bg-dark: #080a0f; }
        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #111a28 0%, #080a0f 100%);
        }
        .dashboard {
            width: 90%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(15px);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .header h1 {
            font-size: 2rem;
            letter-spacing: 4px;
            margin: 0;
            background: linear-gradient(to right, var(--neon-blue), #9d50bb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-bar {
            background: rgba(0,0,0,0.3);
            border-radius: 50px;
            padding: 10px 20px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        .pulse {
            width: 10px;
            height: 10px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-green);
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 50% { opacity: 0.3; } }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .card:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--neon-blue);
            transform: translateY(-5px);
        }
        .card i { font-size: 1.5rem; margin-bottom: 10px; color: var(--neon-blue); }
        .card span { display: block; font-size: 0.8rem; opacity: 0.8; }

        /* استایل‌های مربوط به دکمه ورود */
        .login-section {
            margin-top: 30px;
        }
        #login-button {
            background: linear-gradient(to right, var(--neon-blue), #9d50bb);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            margin-bottom: 15px; /* فاصله با متن پایین */
        }
        #login-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.8);
        }
        #user-info {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 15px; /* فاصله با دکمه */
        }

        footer { margin-top: 30px; font-size: 0.7rem; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>ARS SYSTEM</h1>
        <p>Core Intelligence Interface</p>
    </div>

    <div class="status-bar">
        <div class="pulse"></div>
        <span>سیستم مرکزی فعال است | پروتکل 5.5</span>
    </div>

    <div class="grid">
        <div class="card" onclick="alert('اتصال به n8n برقرار نشد!')">
            <i class="fas fa-robot"></i>
            <strong>اجرای بات</strong>
            <span>Automation Node</span>
        </div>
        <div class="card" onclick="location.reload()">
            <i class="fas fa-sync"></i>
            <strong>بروزرسانی</strong>
            <span>Sync Data</span>
        </div>
        <div class="card">
            <i class="fas fa-database"></i>
            <strong>دیتابیس</strong>
            <span>Neon Cloud</span>
        </div>
        <div class="card" onclick="window.open('https://github.com/arshamstorm-boop/arshamstorm-boop.github.io', '_blank')">
            <i class="fas fa-code-branch"></i>
            <strong>گیت‌هاب</strong>
            <span>Repository</span>
        </div>
    </div>

    <!-- بخش ورود با گوگل -->
    <div class="login-section">
        <button id="login-button">ورود با گوگل</button>
        <div id="user-info"></div>
    </div>

    <footer>
        DESIGNED FOR ARSHAM | © 2026 ARS CORP
    </footer>
</div>

<!-- اسکریپت Firebase و منطق ورود -->
<!-- فقط از CDN استفاده می‌کنیم و همه چیز را در یک اسکریپت قرار می‌دهیم -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script>
    // 1. Firebase رو مقداردهی اولیه کن
    const firebaseConfig = {
      apiKey: "AIzaSyA8uxWsvCcaj94MNmdlENvXe6DnvI21_u0",
      authDomain: "ars-system-25319.firebaseapp.com",
      projectId: "ars-system-25319",
      storageBucket: "ars-system-25319.firebasestorage.app",
      messagingSenderId: "153129390194",
      appId: "1:153129390194:web:4fdbf3c51221e4345a72eb",
      measurementId: "G-5TDFWW6ZQH"
    };

    // Initialize Firebase
    // تابع initializeApp و getAuth و GoogleAuthProvider و signInWithPopup و onAuthStateChanged
    // به دلیل اینکه از CDN استفاده می‌کنیم، مستقیماً در دسترس هستند (Global scope).
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();

    // 2. دکمه ورود با گوگل رو پیدا کن و رویداد کلیک رو بهش اضافه کن
    const loginButton = document.getElementById('login-button');
    const userInfoDiv = document.getElementById('user-info');

    if (loginButton) {
      loginButton.addEventListener('click', async () => {
        try {
          // signInWithPopup مستقیماً قابل دسترسی است
          const result = await signInWithPopup(auth, googleProvider);
          const user = result.user;
          console.log("کاربر وارد شد:", user);
          updateUI(user); // UI رو به روز کن
        } catch (error) {
          console.error("خطا در ورود:", error);
          // نمایش پیام خطا به کاربر
          if (userInfoDiv) {
             userInfoDiv.innerText = "خطا در ورود. لطفاً دوباره تلاش کنید.";
          }
        }
      });
    } else {
      console.error("دکمه ورود با ID 'login-button' پیدا نشد!");
    }

    // 3. وضعیت ورود کاربر رو مدیریت کن و UI رو به روز کن
    // onAuthStateChanged مستقیماً قابل دسترسی است
    onAuthStateChanged(auth, (user) => {
      if (user) {
        console.log("کاربر در حال حاضر وارد شده است:", user);
        updateUI(user);
      } else {
        console.log("کاربر خارج شده است.");
        updateUI(null); // UI رو به حالت خروج برگردون
      }
    });

    // تابعی برای به روز رسانی UI بر اساس وضعیت کاربر
    function updateUI(user) {
        if (user) {
            if (loginButton) loginButton.style.display = 'none'; // دکمه ورود رو مخفی کن
            if (userInfoDiv) {
                userInfoDiv.innerHTML = `
                    سلام ${user.displayName || user.email}! <br>
                    <button onclick="logout()" style="background: none; border: none; color: var(--neon-blue); cursor: pointer; font-size: 0.8rem;">خروج</button>
                `;
            }
        } else {
            if (loginButton) loginButton.style.display = 'block'; // دکمه ورود رو نمایش بده
            if (userInfoDiv) userInfoDiv.innerText = ''; // اطلاعات کاربر رو پاک کن
        }
    }

    // تابع خروج
    function logout() {
        // signOut مستقیماً قابل دسترسی است
        auth.signOut().then(() => {
            console.log("کاربر با موفقیت خارج شد.");
            updateUI(null); // UI رو به حالت خروج برگردون
        }).catch((error) => {
            console.error("خطا در خروج:", error);
            if (userInfoDiv) {
                userInfoDiv.innerText = "خطا در هنگام خروج. لطفاً دوباره تلاش کنید.";
            }
        });
    }

</script>

</body>
</html>
