<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARS System | پلتفرم هوشمند آرشام</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            border: 1px solid #30363d;
            padding: 2rem;
            border-radius: 12px;
            background: #161b22;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h1 {
            color: #58a6ff;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.2rem;
            color: #8b949e;
        }
        .status-pulse {
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #238636;
            border-radius: 50%;
            margin-left: 8px;
            box-shadow: 0 0 0 rgba(35, 134, 54, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(35, 134, 54, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(35, 134, 54, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ARS SYSTEM</h1>
        <p>سیستم هوشمند آرشام در حال بارگذاری است...</p>
        <div>
            <span class="status-pulse"></span>
            <span style="color: #238636;">وضعیت سیستم: فعال</span>
        </div>
    </div>
</body>
</html>
