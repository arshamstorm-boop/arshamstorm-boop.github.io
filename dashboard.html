<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<style>

body{
margin:0;
font-family:'Vazirmatn',sans-serif;
background:#0b0f1c;
color:#fff;
}

.dashboard{
display:flex;
min-height:100vh;
}

.sidebar{
width:260px;
background:linear-gradient(180deg,#0f172a,#0b0f1c);
padding:30px 20px;
border-left:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:22px;
font-weight:900;
margin-bottom:40px;
color:#6366f1;
}

.sidebar a{
display:block;
padding:12px;
margin-bottom:10px;
border-radius:10px;
text-decoration:none;
color:#ccc;
transition:.3s;
}

.sidebar a:hover,
.sidebar a.active{
background:rgba(99,102,241,0.15);
color:#fff;
}

.main{
flex:1;
padding:25px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.user{
background:rgba(255,255,255,0.05);
padding:8px 15px;
border-radius:12px;
}

.logout{
background:#ef4444;
border:none;
color:#fff;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
margin-right:10px;
font-family:'Vazirmatn';
}

.ticker{
display:flex;
gap:10px;
overflow-x:auto;
margin-bottom:20px;
}

.ticker-item{
background:rgba(255,255,255,0.05);
padding:10px 18px;
border-radius:10px;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
gap:18px;
}

.panel{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
padding:18px;
border-radius:18px;
backdrop-filter:blur(15px);
}

.panel h3{
margin-top:0;
font-size:17px;
margin-bottom:12px;
}

.large{
grid-column:span 2;
}

.bar{
height:8px;
background:#1e293b;
border-radius:5px;
margin:5px 0;
overflow:hidden;
}

.bar div{
height:100%;
background:linear-gradient(90deg,#22c55e,#16a34a);
}

.red .bar div{
background:linear-gradient(90deg,#ef4444,#dc2626);
}

.order{
display:flex;
justify-content:space-between;
font-size:13px;
margin:3px 0;
}

.whale{
font-size:13px;
margin-bottom:6px;
}

.status{
width:10px;
height:10px;
background:#22c55e;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

</style>
</head>

<body>

<div class="dashboard">

<aside class="sidebar">

<div class="logo">ARS TERMINAL</div>

<a class="active">🏠 داشبورد</a>
<a href="signals.html">📡 سیگنال‌ها</a>
<a href="shop.html">🛒 فروشگاه</a>
<a>📊 بازار</a>
<a>🤖 AI Engine</a>
<a>💎 VIP</a>

<div style="margin-top:40px;font-size:14px;">
AI CORE <span class="status"></span> ONLINE
</div>

</aside>

<main class="main">

<div class="topbar">

<h2>مرکز کنترل هوش معاملاتی ARS</h2>

<div style="display:flex;align-items:center;gap:10px">

<div class="user">آرشام • Founder</div>

<button id="logoutBtn" class="logout">خروج</button>

</div>

</div>

<div class="ticker" id="ticker"></div>

<div class="grid">

<div class="panel large">
<h3>Live Market Chart</h3>
<div id="chart" style="height:420px"></div>
</div>

<div class="panel">
<h3>Crypto Heatmap</h3>
<div id="heatmap" style="height:320px"></div>
</div>

<div class="panel">
<h3>AI Probability</h3>
BTC 82%
<div class="bar"><div style="width:82%"></div></div>
ETH 64%
<div class="bar red"><div style="width:64%"></div></div>
SOL 71%
<div class="bar"><div style="width:71%"></div></div>
</div>

<div class="panel">
<h3>Profit Analytics</h3>
<p>Today : $1240</p>
<p>Week : $5820</p>
<p>Month : $12480</p>
</div>

<div class="panel">
<h3>Portfolio Allocation</h3>
<canvas id="portfolio"></canvas>
</div>

</div>

</main>
</div>

<script>

/* FIREBASE */

const firebaseConfig = {
apiKey: "AIzaSyA8uxWsvCcaj94MNmdlENvXe6DnvI21_u0",
authDomain: "ars-system-25319.firebaseapp.com",
projectId: "ars-system-25319",
storageBucket: "ars-system-25319.firebasestorage.app",
messagingSenderId: "153129390194",
appId: "1:153129390194:web:4fdbf3c51221e4345a72eb"
};

if (!firebase.apps.length) {
firebase.initializeApp(firebaseConfig);
}

const auth = firebase.auth();

/* AUTH GUARD */

auth.onAuthStateChanged(user=>{
if(!user){
window.location.href="login.html"
}
})

/* LOGOUT */

document.addEventListener("DOMContentLoaded",()=>{

const logoutBtn=document.getElementById("logoutBtn")

logoutBtn.addEventListener("click",async()=>{

await auth.signOut()

localStorage.clear()
sessionStorage.clear()

window.location.href="login.html"

})

})

/* BINANCE TICKER */

async function ticker(){

try{

const res=await fetch("https://api.binance.com/api/v3/ticker/price")
const data=await res.json()

const pairs=["BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT"]

const box=document.getElementById("ticker")

box.innerHTML=""

pairs.forEach(p=>{

const coin=data.find(x=>x.symbol===p)

if(!coin) return

const price=parseFloat(coin.price)

box.innerHTML+=`
<div class="ticker-item">
${p.replace("USDT","")}
<br>$${price.toLocaleString()}
</div>
`

})

}catch(err){

console.error("Ticker Error",err)

}

}

ticker()
setInterval(ticker,10000)

/* TRADINGVIEW */

new TradingView.widget({
container_id:"chart",
width:"100%",
height:420,
symbol:"BINANCE:BTCUSDT",
interval:"15",
theme:"dark",
style:"1",
locale:"fa",
toolbar_bg:"#0b0f1c",
enable_publishing:false,
allow_symbol_change:true
})

new TradingView.widget({
container_id:"heatmap",
width:"100%",
height:320,
symbol:"CRYPTOCAP:TOTAL",
interval:"D",
theme:"dark",
style:"1",
locale:"fa"
})

/* PORTFOLIO */

new Chart(document.getElementById("portfolio"),{

type:"doughnut",

data:{
labels:["Crypto","Forex","Commodities"],
datasets:[{
data:[84200,21300,9600],
backgroundColor:["#6366f1","#22c55e","#f59e0b"]
}]
},

options:{
plugins:{
legend:{
labels:{color:"#fff"}
}
}
}

})

</script>

</html>
